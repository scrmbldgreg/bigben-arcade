<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blitz-by-Blitz | TicTacBlitz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at top left, #0f172a, #020617); }
    #board {
      display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px);
      width: 300px; height: 300px; border: 4px solid #1e293b; border-radius: 1rem;
      overflow: hidden; background: #0f172a;
    }
    .cell {
      border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 900; cursor: pointer; transition: all 0.2s;
    }
    .player-column { transition: all 0.3s ease; width: 220px; border: 2px solid #1e293b; border-radius: 1.5rem; padding: 2rem 1rem; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 0.5rem; }
    .turn-glow-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 0.5rem 1.5rem; border-radius: 99px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4 overflow-hidden relative">

  <h1 class="text-5xl font-black mb-6 tracking-tighter bg-gradient-to-br from-blue-400 via-purple-400 to-pink-500 bg-clip-text text-transparent italic text-center uppercase">
    TicTacBlitz
  </h1>

  <div id="lobby-setup" class="w-full max-w-sm space-y-4 bg-slate-900/80 p-8 rounded-3xl border border-white/10 backdrop-blur-md shadow-2xl">
    <div class="flex p-1 bg-slate-950 rounded-xl">
        <button id="tabCreate" class="flex-1 py-2 rounded-lg bg-blue-600 font-bold transition-all">Create</button>
        <button id="tabJoin" class="flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all">Join</button>
    </div>
    <input id="playerName" placeholder="Your Name" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
    <input id="lobbyId" placeholder="Lobby Name" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
    <button id="actionBtn" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg">Create Lobby</button>
    <div class="pt-2 text-center">
        <button onclick="window.location.href='../index.html'" class="text-[10px] text-slate-500 uppercase font-bold hover:text-white transition-colors">Back to Menu</button>
    </div>
  </div>

  <div id="waiting-room" class="hidden w-full max-w-sm space-y-6 bg-slate-900 p-8 rounded-3xl border border-slate-800 relative shadow-2xl">
    <div class="flex justify-between items-start">
        <div>
            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-1">Lobby Code</p>
            <h2 class="text-xl font-bold italic text-blue-400 cursor-pointer hover:underline leading-none" id="displayLobbyName"></h2>
        </div>
    </div>
    <div id="lobby-stats" class="bg-slate-950/50 p-3 rounded-xl border border-slate-800 flex justify-around text-xs font-bold text-slate-400 italic">
        <div><span id="lobbyName1">Host</span>: <span id="lobbyScore1" class="text-white">0</span></div>
        <div><span id="lobbyName2">Guest</span>: <span id="lobbyScore2" class="text-white">0</span></div>
    </div>
    <div class="space-y-4 text-center">
        <p id="pickerPrompt" class="text-xs text-slate-500 uppercase tracking-widest italic font-medium">Pick Your Side</p>
        <div class="flex gap-4">
            <button id="pickX" class="flex-1 py-4 rounded-xl border-2 border-slate-700 font-black text-2xl transition-all">X</button>
            <button id="pickO" class="flex-1 py-4 rounded-xl border-2 border-slate-700 font-black text-2xl transition-all">O</button>
        </div>
    </div>
    <div class="flex flex-col gap-2 pt-4">
        <button id="readyBtn" class="w-full bg-slate-800 py-3 rounded-xl font-bold border border-slate-700 disabled:opacity-30">Mark Ready</button>
        <button id="startMatchBtn" class="hidden w-full bg-blue-600 py-3 rounded-xl font-black uppercase tracking-widest shadow-lg">Start Match</button>
    </div>
  </div>

  <div id="game" class="hidden flex flex-row items-center justify-center gap-12 w-full max-w-6xl">
    <div id="card1" class="player-column">
        <p id="name1" class="text-xs font-bold text-slate-400 uppercase tracking-widest truncate">---</p>
        <p id="role1" class="text-5xl font-black">?</p>
        <p class="text-sm font-black text-slate-300">SCORE: <span id="score1" class="text-white">0</span></p>
    </div>
    <div class="flex flex-col items-center">
        <div id="board" class="shadow-2xl"></div>
        <div class="mt-8 flex flex-col items-center">
            <span id="timerDisplay" class="text-5xl font-black font-mono text-white tracking-tighter">1.0</span>
            <span class="text-[10px] uppercase text-slate-500 font-bold tracking-widest mt-2">Blitz Timer</span>
        </div>
        <button id="newGameBtn" class="hidden mt-6 bg-white text-black px-10 py-3 rounded-xl font-black uppercase text-xs tracking-tighter shadow-lg hover:bg-slate-200 transition-all">Reset Match</button>
    </div>
    <div id="card2" class="player-column">
        <p id="name2" class="text-xs font-bold text-slate-400 uppercase tracking-widest truncate">---</p>
        <p id="role2" class="text-5xl font-black">?</p>
        <p class="text-sm font-black text-slate-300">SCORE: <span id="score2" class="text-white">0</span></p>
    </div>
  </div>

  <div id="toast" class="toast">Link Copied!</div>
  
  <button onclick="confirmExit()" 
        class="fixed bottom-8 left-8 z-[100] group flex items-center justify-center w-12 h-12 bg-slate-900/80 border border-white/10 rounded-2xl backdrop-blur-md hover:bg-red-600 hover:border-red-500 transition-all duration-300 shadow-2xl">
    <span class="text-xl group-hover:scale-110 transition-transform">✖</span>
    <span class="absolute left-16 scale-0 group-hover:scale-100 transition-all origin-left bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest py-2 px-4 rounded-xl border border-white/10 pointer-events-none whitespace-nowrap">
        Exit to Menu
    </span>
  </button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBSaKTzhqAU7EGgB2R614dx6LYUHmak2hE", 
        authDomain: "tictactoe-72e15.firebaseapp.com", 
        databaseURL: "https://tictactoe-72e15-default-rtdb.firebaseio.com",
        projectId: "tictactoe-72e15" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let savedSession = JSON.parse(localStorage.getItem('blitz_session') || 'null');
    let playerUid = savedSession ? savedSession.uid : Math.random().toString(36).substring(7);
    let playerName = savedSession ? savedSession.name : "";
    let lid = savedSession ? savedSession.lid : null;
    let playerRole = null, lobbyRef = null, timerInterval = null, mode = 'create';

    const setupArea = document.getElementById('lobby-setup'), waitRoom = document.getElementById('waiting-room'), gameArea = document.getElementById('game');

    window.addEventListener('DOMContentLoaded', async () => {
        const urlLobby = new URLSearchParams(window.location.search).get('lobby');
        if (urlLobby) { document.getElementById('lobbyId').value = urlLobby; mode = 'join'; tabJoin.click(); }
        if (lid) {
            lobbyRef = ref(db, `lobbies/${lid}`);
            const snap = await get(lobbyRef);
            if (snap.exists()) enterWaitingRoom(lid);
            else localStorage.removeItem('blitz_session');
        }
    });

    const tabCreate = document.getElementById('tabCreate'), tabJoin = document.getElementById('tabJoin'), actionBtn = document.getElementById('actionBtn');
    tabCreate.onclick = () => { mode = 'create'; tabCreate.className = 'flex-1 py-2 rounded-lg bg-blue-600 font-bold transition-all'; tabJoin.className = 'flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all'; actionBtn.textContent = 'Create Lobby'; };
    tabJoin.onclick = () => { mode = 'join'; tabJoin.className = 'flex-1 py-2 rounded-lg bg-green-600 font-bold transition-all'; tabCreate.className = 'flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all'; actionBtn.textContent = 'Join Lobby'; };

    const boardEl = document.getElementById('board');
    for (let i = 0; i < 9; i++) {
        const c = document.createElement('div'); c.id = `cell-${i}`; c.className = 'cell';
        c.onclick = () => makeMove(i); boardEl.appendChild(c);
    }

    actionBtn.onclick = async () => {
        playerName = document.getElementById('playerName').value.trim();
        if (!playerName) return alert("Enter name");
        let inputLid = document.getElementById('lobbyId').value.trim().toUpperCase() || Math.random().toString(36).substring(2, 7).toUpperCase();
        lobbyRef = ref(db, `lobbies/${inputLid}`);
        const snap = await get(lobbyRef);

        if (mode === 'create') {
            if (snap.exists()) return alert("Lobby Taken!");
            await set(lobbyRef, { board: Array(9).fill(""), turn: "X", piecesOrder: { X: [99], O: [99] }, players: { [playerUid]: { uid: playerUid, name: playerName, role: null, ready: false, score: 0, isHost: true } }, started: false, lastMoveTime: Date.now() });
        } else {
            if (!snap.exists()) return alert("Not found!");
            if (Object.keys(snap.val().players || {}).length >= 2) return alert("Lobby full!");
            await update(ref(db, `lobbies/${inputLid}/players/${playerUid}`), { uid: playerUid, name: playerName, role: null, ready: false, score: 0, isHost: false });
        }
        lid = inputLid;
        localStorage.setItem('blitz_session', JSON.stringify({ uid: playerUid, lid: lid, name: playerName }));
        enterWaitingRoom(lid);
    };

    function enterWaitingRoom(lobbyId) {
        setupArea.classList.add('hidden'); waitRoom.classList.remove('hidden');
        const nameDisp = document.getElementById('displayLobbyName');
        nameDisp.textContent = lobbyId;
        
        nameDisp.onclick = () => {
            const url = `${window.location.origin}${window.location.pathname}?lobby=${lobbyId}`;
            navigator.clipboard.writeText(url);
            const t = document.getElementById('toast'); t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        };

        onValue(lobbyRef, (snap) => {
            const d = snap.val();
            if (!d) { localStorage.removeItem('blitz_session'); location.reload(); return; }
            const playersArr = Object.values(d.players || {});
            const me = d.players[playerUid];
            if (!me) return;
            playerRole = me.role;

            document.getElementById('lobbyName1').textContent = playersArr[0]?.name || "Host";
            document.getElementById('lobbyScore1').textContent = playersArr[0]?.score || 0;
            document.getElementById('lobbyName2').textContent = playersArr[1]?.name || "Guest";
            document.getElementById('lobbyScore2').textContent = playersArr[1]?.score || 0;

            const xTaken = playersArr.some(p => p.role === 'X' && p.uid !== playerUid);
            const oTaken = playersArr.some(p => p.role === 'O' && p.uid !== playerUid);
            
            document.getElementById('pickX').className = `flex-1 py-4 rounded-xl border-2 font-black text-2xl transition-all ${playerRole === 'X' ? 'border-blue-500 bg-blue-500/20' : xTaken ? 'opacity-20 pointer-events-none' : 'border-slate-700'}`;
            document.getElementById('pickO').className = `flex-1 py-4 rounded-xl border-2 font-black text-2xl transition-all ${playerRole === 'O' ? 'border-pink-500 bg-pink-500/20' : oTaken ? 'opacity-20 pointer-events-none' : 'border-slate-700'}`;

            const readyBtn = document.getElementById('readyBtn');
            readyBtn.textContent = me.ready ? "✓ Ready" : "Mark Ready";
            readyBtn.className = `w-full py-3 rounded-xl font-bold transition-all ${me.ready ? 'bg-green-600 border-green-500 shadow-lg' : 'bg-slate-700 border-slate-600 shadow-md'}`;
            readyBtn.disabled = !playerRole;

            if (me.isHost) {
                const startBtn = document.getElementById('startMatchBtn');
                startBtn.classList.toggle('hidden', false);
                startBtn.disabled = !(playersArr.length === 2 && playersArr.every(p => p.ready));
            }
            if (d.started) runGame();
            else { waitRoom.classList.remove('hidden'); gameArea.classList.add('hidden'); }
        });
    }

    async function makeMove(i) {
        const snap = await get(lobbyRef);
        const d = snap.val();
        if (!d || d.winner || d.turn !== playerRole || d.board[i] !== "") return;
        let nb = [...d.board], po = (d.piecesOrder[playerRole] || []).filter(v => v !== 99);
        if (po.length < 3) { nb[i] = playerRole; po.push(i); } 
        else { const old = po.shift(); nb[old] = ""; nb[i] = playerRole; po.push(i); }
        const win = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c => c.every(idx => nb[idx] === playerRole));
        const updates = { board: nb, [`piecesOrder/${playerRole}`]: po, lastMoveTime: Date.now() };
        if (win) {
            updates.winner = playerRole;
            updates[`players/${playerUid}/score`] = (d.players[playerUid].score || 0) + 1;
            updates.loserUid = Object.keys(d.players).find(id => id !== playerUid);
        } else { updates.turn = playerRole === "X" ? "O" : "X"; }
        update(lobbyRef, updates);
    }

    function runGame() {
        waitRoom.classList.add('hidden'); gameArea.classList.remove('hidden');
        onValue(lobbyRef, (snap) => {
            const d = snap.val(); if (!d || !d.started) return;
            const pArr = Object.values(d.players);
            document.getElementById('name1').textContent = pArr[0].name;
            document.getElementById('score1').textContent = pArr[0].score;
            document.getElementById('role1').textContent = pArr[0].role || "?";
            document.getElementById('name2').textContent = pArr[1]?.name || "Guest";
            document.getElementById('score2').textContent = pArr[1]?.score || 0;
            document.getElementById('role2').textContent = pArr[1]?.role || "?";
            
            document.getElementById('card1').className = `player-column ${d.turn === pArr[0].role ? 'turn-glow-active' : ''}`;
            document.getElementById('card2').className = `player-column ${d.turn === pArr[1]?.role ? 'turn-glow-active' : ''}`;

            renderBoard(d.board, d.piecesOrder, d.turn);
            startTimer(d.lastMoveTime, d.turn, d.winner, d.board);
            document.getElementById('newGameBtn').classList.toggle('hidden', !d.winner);
        });
    }

    function startTimer(lastTime, turn, winner, curBoard) {
        clearInterval(timerInterval);
        if (winner) return;
        timerInterval = setInterval(() => {
            const rem = Math.max(0, 1.0 - (Date.now() - lastTime) / 1000).toFixed(1);
            document.getElementById('timerDisplay').textContent = rem;
            if (rem <= 0 && playerRole === turn) {
                clearInterval(timerInterval);
                const emptyIdx = curBoard.indexOf("");
                if (emptyIdx !== -1) makeMove(emptyIdx);
            }
        }, 100);
    }

    function renderBoard(b, o, curr) {
        b.forEach((v, i) => {
            const c = document.getElementById(`cell-${i}`);
            c.textContent = v;
            c.className = `cell ${v === 'X' ? 'text-blue-400' : 'text-pink-500'}`;
            if (curr === playerRole && v === playerRole && o[playerRole] && o[playerRole].length === 3 && o[playerRole][0] === i) c.classList.add("opacity-30");
        });
    }

    document.getElementById('pickX').onclick = () => update(ref(db, `lobbies/${lid}/players/${playerUid}`), { role: 'X', ready: false });
    document.getElementById('pickO').onclick = () => update(ref(db, `lobbies/${lid}/players/${playerUid}`), { role: 'O', ready: false });
    document.getElementById('readyBtn').onclick = async () => {
        const snap = await get(ref(db, `lobbies/${lid}/players/${playerUid}`));
        update(ref(db, `lobbies/${lid}/players/${playerUid}`), { ready: !snap.val().ready });
    };
    document.getElementById('startMatchBtn').onclick = () => update(lobbyRef, { started: true, lastMoveTime: Date.now() });

    document.getElementById('newGameBtn').onclick = async () => {
        const snap = await get(lobbyRef);
        const d = snap.val();
        const updates = { board: Array(9).fill(""), turn: "X", piecesOrder: {X:[99], O:[99]}, winner: null, started: false };
        Object.keys(d.players).forEach(uid => { updates[`players/${uid}/ready`] = false; updates[`players/${uid}/role`] = null; });
        update(lobbyRef, updates);
    };

    window.confirmExit = async function() {
        const snap = await get(lobbyRef);
        if (!snap.exists()) { window.location.href = '../index.html'; return; }
        const d = snap.val();
        if (d.players[playerUid]?.isHost) {
            if (confirm("Close lobby for everyone?")) {
                await remove(lobbyRef); localStorage.removeItem('blitz_session'); window.location.href = '../index.html';
            }
        } else {
            if (confirm("Leave lobby?")) { localStorage.removeItem('blitz_session'); window.location.href = '../index.html'; }
        }
    }
</script>
</body>
</html>
