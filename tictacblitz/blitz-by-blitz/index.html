<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicTacBlitz | Multiplayer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at top left, #0f172a, #020617); }
    #board {
      display: grid; grid-template-columns: repeat(3, 100px); grid-template-rows: repeat(3, 100px);
      width: 300px; height: 300px; border: 4px solid #1e293b; border-radius: 1rem;
      overflow: hidden; background: #0f172a;
    }
    .cell {
      border: 1px solid #1e293b; display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 900; cursor: pointer; transition: all 0.2s;
    }
    .player-column { transition: all 0.3s ease; width: 220px; border: 2px solid #1e293b; border-radius: 1.5rem; padding: 2rem 1rem; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 0.5rem; }
    .turn-glow-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #3b82f6; color: white; padding: 0.5rem 1.5rem; border-radius: 99px; font-size: 0.8rem; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    
    input[type=range] { appearance: none; background: transparent; cursor: pointer; }
    input[type=range]::-webkit-slider-runnable-track { background: rgba(255, 255, 255, 0.1); height: 6px; border-radius: 10px; }
    input[type=range]::-webkit-slider-thumb { appearance: none; height: 18px; width: 18px; background: #3b82f6; border-radius: 50%; margin-top: -6px; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    .preset-btn.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: white; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white p-4 overflow-hidden relative">

  <h1 class="text-5xl font-black mb-6 tracking-tighter bg-gradient-to-br from-blue-400 via-purple-400 to-pink-500 bg-clip-text text-transparent italic text-center uppercase">
    TicTacBlitz
  </h1>

  <div id="lobby-setup" class="w-full max-w-sm space-y-4 bg-slate-900/80 p-8 rounded-3xl border border-white/10 backdrop-blur-md shadow-2xl">
    <div class="flex p-1 bg-slate-950 rounded-xl">
        <button id="tabCreate" class="flex-1 py-2 rounded-lg bg-blue-600 font-bold transition-all">Create</button>
        <button id="tabJoin" class="flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all">Join</button>
    </div>
    
    <div class="space-y-3">
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Your Name</label>
            <input id="playerName" placeholder="PLAYER" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-400 mt-1">
        </div>

        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Lobby Name</label>
            <input id="lobbyId" placeholder="LOBBY-CODE" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none uppercase font-mono tracking-widest mt-1">
        </div>
        
        <div id="hostControls" class="pt-2 space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Select Difficulty</label>
                <div class="grid grid-cols-3 gap-2 mt-1">
                    <button onclick="setMultiDifficulty(8, this)" class="multi-preset py-2 rounded-xl bg-slate-950 border border-slate-800 text-[10px] font-black uppercase hover:border-blue-500 transition-all">Easy</button>
                    <button onclick="setMultiDifficulty(5, this)" class="multi-preset py-2 rounded-xl bg-slate-950 border border-slate-800 text-[10px] font-black uppercase hover:border-blue-500 transition-all active">Mid</button>
                    <button onclick="setMultiDifficulty(2, this)" class="multi-preset py-2 rounded-xl bg-slate-950 border border-slate-800 text-[10px] font-black uppercase hover:border-blue-500 transition-all">Hard</button>
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Custom Timer</label>
                    <span id="diffDisplay" class="text-xs font-black text-blue-400 bg-blue-400/10 px-2 py-0.5 rounded">5s</span>
                </div>
                <input id="timerSlider" type="range" min="1" max="10" value="5" class="w-full" oninput="updateMultiSlider(this.value)">
                <div class="flex justify-between text-[8px] text-slate-600 font-bold uppercase mt-1">
                    <span>Blitz (1s)</span>
                    <span>Relaxed (10s)</span>
                </div>
            </div>
        </div>
    </div>

    <button id="actionBtn" class="w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg">Create Lobby</button>
    
    <div class="pt-2 text-center">
        <button onclick="window.location.href='../index.html'" class="text-[10px] text-slate-500 uppercase font-bold hover:text-white transition-colors">Back to Menu</button>
    </div>
  </div>

  <script type="module">
    // ... [Original Firebase Imports and Config] ...

    let lobbyBlitzTimer = 5;

    // Pattern Function: Set Difficulty via Preset
    window.setMultiDifficulty = (val, btn) => {
        lobbyBlitzTimer = val;
        document.getElementById('timerSlider').value = val;
        document.getElementById('diffDisplay').textContent = val + 's';
        document.querySelectorAll('.multi-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    };

    // Pattern Function: Set Difficulty via Slider
    window.updateMultiSlider = (val) => {
        lobbyBlitzTimer = val;
        document.getElementById('diffDisplay').textContent = val + 's';
        document.querySelectorAll('.multi-preset').forEach(b => b.classList.remove('active'));
    };

    // UI Tab Logic
    tabCreate.onclick = () => { 
        mode = 'create'; 
        hostControls.classList.remove('hidden'); 
        tabCreate.className = 'flex-1 py-2 rounded-lg bg-blue-600 font-bold transition-all'; 
        tabJoin.className = 'flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all'; 
        actionBtn.className = 'w-full bg-blue-600 hover:bg-blue-500 font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg'; 
        actionBtn.textContent = 'Create Lobby'; 
    };
    
    tabJoin.onclick = () => { 
        mode = 'join'; 
        hostControls.classList.add('hidden'); 
        tabJoin.className = 'flex-1 py-2 rounded-lg bg-green-600 font-bold transition-all'; 
        tabCreate.className = 'flex-1 py-2 rounded-lg font-bold text-slate-400 transition-all'; 
        actionBtn.className = 'w-full bg-green-600 hover:bg-green-500 font-black py-4 rounded-xl transition-all uppercase tracking-widest shadow-lg'; 
        actionBtn.textContent = 'Join Lobby'; 
    };

    // Modified Action Logic to send selected timer
    actionBtn.onclick = async () => {
        playerName = document.getElementById('playerName').value.trim();
        if (!playerName) return alert("Enter name");
        let lid = lobbyInput.value.trim().replace(/\s+/g, '-');
        if (!lid && mode === 'create') lid = Math.random().toString(36).substring(2, 7).toUpperCase();
        if (!lid) return alert("Lobby name required!");

        lobbyRef = doc(db, "lobbies", lid);
        const snap = await getDoc(lobbyRef);
        
        if (mode === 'create') {
            if (snap.exists()) return alert("Lobby Name Taken!");
            // Get final value from slider just in case
            const finalTimer = parseInt(document.getElementById('timerSlider').value);
            await setDoc(lobbyRef, { 
                board: Array(9).fill(""), turn: "X", piecesOrder: {X:[], O:[]}, 
                players: [{uid: playerUid, name: playerName, role: null, ready: false, score: 0, isHost: true}], 
                winner: null, started: false, lastMoveTime: Date.now(), abander: null, loserUid: null,
                timerRule: finalTimer 
            });
        } else {
            // Join Logic remains same...
        }
        enterWaitingRoom(lid);
    };

    // Rest of game logic remains same, automatically using d.timerRule
  </script>
</body>
</html>
